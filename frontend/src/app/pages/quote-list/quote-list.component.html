<div class="quote-list-container">
  <h2>Quotes</h2>

  <!-- TODO: Display error message -->
  <div *ngIf="errorMessage" class="alert error">
    {{ errorMessage }}
  </div>

  <!-- Filters -->
  <div class="filters-panel">
    <div class="filter-group">
      <label for="productFilter">Product:</label>
      <select id="productFilter" [(ngModel)]="selectedProductId" (change)="applyFilters()">
        <option [value]="null">-- All Products --</option>
        <!-- TODO: Populate with products from API -->
        <option *ngFor="let product of products" [value]="product.id">
          {{ product.name }}
        </option>
      </select>
    </div>

    <div class="filter-group">
      <label for="minPriceFilter">Minimum Price (TND):</label>
      <input
        type="number"
        id="minPriceFilter"
        [(ngModel)]="minPrice"
        (change)="applyFilters()"
        placeholder="0"
      />
    </div>

    <button class="secondary" (click)="resetFilters()">Reset Filters</button>
  </div>

  <!-- TODO: Show loading spinner -->
  <div *ngIf="loading" class="loading-container">
    <div class="loading"></div>
    <p>Loading quotes...</p>
  </div>

  <!-- Quotes Table -->
  <div *ngIf="!loading && filteredQuotes.length > 0" class="table-container">
    <div class="sort-controls">
      <button
        [class.active]="sortField === 'date'"
        (click)="changeSortField('date')"
      >
        Date {{ sortField === 'date' ? (sortDirection === 'asc' ? '↑' : '↓') : '' }}
      </button>
      <button
        [class.active]="sortField === 'price'"
        (click)="changeSortField('price')"
      >
        Price {{ sortField === 'price' ? (sortDirection === 'asc' ? '↑' : '↓') : '' }}
      </button>
    </div>

    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Customer Name</th>
          <th>Product</th>
          <th>Zone</th>
          <th>Final Price (TND)</th>
          <th>Created Date</th>
        </tr>
      </thead>
      <tbody>
        <!-- TODO: Populate table with quotes -->
        <tr *ngFor="let quote of filteredQuotes" (click)="viewQuote(quote.id)" class="clickable">
          <td>{{ quote.id }}</td>
          <td>{{ quote.customerName }}</td>
          <td>{{ quote.productName }}</td>
          <td>{{ quote.zone }}</td>
          <td class="price">{{ quote.finalPrice | number:'1.2-2' }}</td>
          <td>{{ quote.createdAt | date:'short' }}</td>
        </tr>
      </tbody>
    </table>
  </div>

  <!-- Empty State -->
  <div *ngIf="!loading && filteredQuotes.length === 0" class="empty-state">
    <p>No quotes found. <a routerLink="/quotes/new">Create one now</a></p>
  </div>
</div>
